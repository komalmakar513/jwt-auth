version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: jwt_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - jwt-network

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    container_name: jwt_backend
    environment:
      PORT: 5000
      MONGO_URI: mongodb://admin:password123@mongodb:27017/jwt-auth?authSource=admin
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      NODE_ENV: development
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - jwt-network
    volumes:
      - ./backend:/app
    command: npm run dev

volumes:
  mongodb_data:

networks:
  jwt-network:
    driver: bridge
